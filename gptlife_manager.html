<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Manager (Clean)</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
  margin:0;
  padding:20px;
}
.container{max-width:700px;margin:auto;}
input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
.task{
  background:#1b1b1b;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.done{text-decoration:line-through;opacity:.6;}
button{cursor:pointer;}
</style>
</head>

<body>
<div class="container">
  <h2>Task Manager</h2>
  <input id="taskInput" placeholder="Add task and press Enter">
  <div id="tasks"></div>
</div>

<script>
// ===== CLEAN ARCHITECTURE =====

// Load data
let appData = JSON.parse(localStorage.getItem("trackerData") || "{}");
if(!appData.tasks) appData.tasks = [];

// Save data
function save(){
  localStorage.setItem("trackerData", JSON.stringify(appData));
}

// Unique ID
function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

// Render tasks
function render(){
  const container = document.getElementById("tasks");
  container.innerHTML = "";

  appData.tasks.forEach(t=>{
    const div = document.createElement("div");
    div.className = "task" + (t.done ? " done":"");

    div.innerHTML = `
      <span>${t.title}</span>
      <div>
        <button onclick="toggle('${t.id}')">✔</button>
        <button onclick="del('${t.id}')">✕</button>
      </div>
    `;

    container.appendChild(div);
  });
}

// Add task
function add(title){
  if(!title.trim()) return;
  appData.tasks.push({id:uid(),title,done:false});
  save();
  render();
}

// Toggle task
function toggle(id){
  const t = appData.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = !t.done;
  save();
  render();
}

// Delete task
function del(id){
  appData.tasks = appData.tasks.filter(t=>t.id!==id);
  save();
  render();
}

// Input handler
document.getElementById("taskInput").addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    add(e.target.value);
    e.target.value="";
  }
});

// Init
render();
</script>
</body>
</html>
